name: Validate Renovate config

on:
  push:
    branches:
      - main
    paths:
      - "renovate-config.json"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "renovate-config.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate Renovate config
        run: docker run --rm -v "$PWD/renovate-config.json:/tmp/renovate-config.json" ghcr.io/renovatebot/renovate:43.205.2 renovate-config-validator /tmp/renovate-config.json
